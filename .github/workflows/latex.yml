name: Build Resume

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: xu-cheng/latex-action@v2
        with:
          root_file: resume.tex

      - uses: actions/upload-artifact@v4
        with:
          name: resume
          path: resume.pdf
